<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 🎉</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow-x: hidden;
}

/* SCROLL */
.container {
  height: 100vh;
  overflow-y: scroll;
}

/* SECTION */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* 🎂 CAKE FIX (MAIN FIX) */
#cake {
  width: 220px !important;
  height: auto !important;
  display: block !important;
  opacity: 1 !important;
  visibility: visible !important;
}

/* IMAGE */
img {
  max-width: 90%;
  max-height: 50vh;
  object-fit: contain;
  border-radius: 15px;
}

/* TEXT */
h1 { font-size: 7vw; }
h2 { font-size: 5vw; }

/* LAST */
#last h1 { font-size: 9vw; }
#last h2 { font-size: 6vw; }

/* BUTTON */
button {
  padding: 12px 25px;
  font-size: 18px;
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 20px;
}

/* STARS */
.stars::after {
  content: "";
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  box-shadow:
    20px 30px white, 100px 150px white, 200px 80px white,
    300px 200px white, 400px 120px white;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  from {opacity: 0.3;}
  to {opacity: 1;}
}

/* HEARTS */
.heart {
  position: fixed;
  bottom: -20px;
  animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
  to {transform: translateY(-100vh);}
}

</style>
</head>

<body>

<div class="stars"></div>

<!-- MUSIC -->
<audio id="music" preload="auto">
  <source src="https://files.catbox.moe/k1lm56.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <!-- 1 -->
  <div class="section">
    <h1 id="text"></h1>
  </div>

  <!-- 2 (CAKE FIXED) -->
  <div class="section">
    <img id="cake" src="https://i.postimg.cc/QdnZbNFk/Pngtree_happy_birthday_cake_transparent_background_14578946.png">
    <button onclick="cutCake()">🎂 Cake Cut Kare</button>
  </div>

  <!-- 3 -->
  <div class="section">
    <h2>
    बड़े भाई तो सच में बड़े ही होते हैं,<br>
    हर खुशी को खास बना देते हैं,<br>
    कभी कार में घुमाना, कभी पार्टी की जान बन जाना,<br>
    उनके साथ हर पल यादगार बन जाता है ❤️
    </h2>
  </div>

  <!-- 4 -->
  <div class="section">
    <img id="slideshow">
  </div>

  <!-- 5 -->
  <div class="section" id="last">
    <h1>🎉 Happy Birthday 🎉</h1>
    <h2>Bade Bhai ❤️</h2>
  </div>

</div>

<script>

/* TEXT */
let text = "Happy Birthday Bade Bhai 🎉";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 80);
  }
}
typeEffect();

/* HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💓";
  h.style.left=Math.random()*100+"%";
  h.style.fontSize=(20+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);

/* CONFETTI */
function blastConfetti(){
  for(let i=0;i<200;i++){
    let c=document.createElement("div");
    c.style.position="fixed";
    c.style.width="8px";
    c.style.height="8px";
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    c.style.top="50%";
    c.style.left="50%";

    let angle=Math.random()*2*Math.PI;
    let dist=Math.random()*400;

    let x=Math.cos(angle)*dist;
    let y=Math.sin(angle)*dist;

    c.style.transition="1.5s";
    document.body.appendChild(c);

    setTimeout(()=>{
      c.style.transform=`translate(${x}px,${y}px)`;
      c.style.opacity=0;
    },50);

    setTimeout(()=>c.remove(),1500);
  }
}

/* CAKE */
function cutCake(){
  let music=document.getElementById("music");
  music.currentTime=0;
  music.play();

  blastConfetti();
}

/* SLIDESHOW */
let images=[
  "https://i.postimg.cc/rwgwLLKm/IMG_20251111_144119_428.jpg",
  "https://i.postimg.cc/pd4x2Vxd/IMG_20251111_144235_909.jpg",
  "https://i.postimg.cc/5yqMqwzS/IMG_20251111_143534_587.jpg",
  "https://i.postimg.cc/BvVZXc5q/IMG_20240811_111728_107.jpg",
  "https://i.postimg.cc/8C9D1kDW/IMG_20240218_192049_056.jpg"
];

let index=0;

function startSlideshow(){
  let slide=document.getElementById("slideshow");

  function show(){
    slide.src=images[index];
    index=(index+1)%images.length;
  }

  show();
  setInterval(show,3000);
}

startSlideshow();

</script>

</body>
</html>
